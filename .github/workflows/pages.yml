name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy static gallery
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.3

      - name: Prepare static site
        run: |
          mkdir -p ../_site
          cp index.html site.css README.md ROADMAP.md ../_site/
          cp -R DualThemeSpecBoard LiquidGlassAuroraBoard NeoGlowControlBoard SoftNeumorphicDualThemeBoard ../_site/
          touch ../_site/.nojekyll

      - name: Publish gh-pages branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch --orphan gh-pages-deploy
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R ../_site/. .
          git add -A
          git commit -m "Deploy Pages from ${GITHUB_SHA}"
          git push --force origin HEAD:gh-pages
