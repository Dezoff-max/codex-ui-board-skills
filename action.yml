name: Codex Skill Lint
description: Validate Codex skill packs with reusable profiles for UI board repos and generic skill bundles.
author: Dezoff-max

branding:
  icon: check-circle
  color: blue

inputs:
  root:
    description: Repository root to validate.
    required: false
    default: "."
  profile:
    description: Validation profile to run. Use ui-board-repo for this repository layout or skill-pack for portable Codex skill bundles.
    required: false
    default: "ui-board-repo"
  args:
    description: Additional validator arguments such as --structure, --tokens, --sync, or --gallery.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Run codex-skill-lint
      shell: bash
      run: node "$GITHUB_ACTION_PATH/scripts/validate-repo.mjs" --root "${{ inputs.root }}" --profile "${{ inputs.profile }}" ${{ inputs.args }}
